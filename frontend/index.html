<!-- index.html -->
<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Tell mobile browsers to use the device's full width and scale -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Disable automatic phone number detection for better design control -->
    <meta name="format-detection" content="telephone=no">

    <!-- Add to home screen for Safari on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- Add to home screen for Chrome on Android -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Content Security Policy (CSP) - Suositus:
         - Rajaa ulkopuoliset resurssit vain tunnetuille lähteille (tässä esimerkissä cdn.jsdelivr.net käytössä).
         - Mieti, voitko välttää 'unsafe-inline' ja käyttää nonce/hashi-tapaa inline-koodille.
         - Pidä domain-luettelo mahdollisimman suppeana ja kiristä tarvittaessa.-->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
        style-src 'self';
        script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; 
        connect-src 'self'; 
        img-src 'self'; 
        font-src 'self'; 
        base-uri 'self'; 
        form-action 'self';">


    <!-- 
                   frame-ancestors 'self';"
                     -->

    <title>Easelect</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/imports.css">

</head>

<body>
    <!-- Sisältö -->
    <div id="navbar">
        <!-- Painikkeet generoidaan tänne -->
        <div class="language-selection menu-language-selection">
            <button class="select-selected regular-button"><svg class="svg-icon" xmlns="http://www.w3.org/2000/svg"
                    height="24" viewBox="0 -960 960 960" width="24">
                    <path
                        d="M480-80q-82 0-155-31.5t-127.5-86Q143-252 111.5-325T80-480q0-83 31.5-155.5t86-127Q252-817 325-848.5T480-880q83 0 155.5 31.5t127 86q54.5 54.5 86 127T880-480q0 82-31.5 155t-86 127.5q-54.5 54.5-127 86T480-80Zm0-82q26-36 45-75t31-83H404q12 44 31 83t45 75Zm-104-16q-18-33-31.5-68.5T322-320H204q29 50 72.5 87t99.5 55Zm208 0q56-18 99.5-55t72.5-87H638q-9 38-22.5 73.5T584-178ZM170-400h136q-3-20-4.5-39.5T300-480q0-21 1.5-40.5T306-560H170q-5 20-7.5 39.5T160-480q0 21 2.5 40.5T170-400Zm216 0h188q3-20 4.5-39.5T580-480q0-21-1.5-40.5T574-560H386q-3 20-4.5 39.5T380-480q0 21 1.5 40.5T386-400Zm268 0h136q5-20 7.5-39.5T800-480q0-21-2.5-40.5T790-560H654q3 20 4.5 39.5T660-480q0 21-1.5 40.5T654-400Zm-16-240h118q-29-50-72.5-87T584-782q18 33 31.5 68.5T638-640Zm-234 0h152q-12-44-31-83t-45-75q-26 36-45 75t-31 83Zm-200 0h118q9-38 22.5-73.5T376-782q-56 18-99.5 55T204-640Z">
                    </path>
                </svg> EN </button>
            <div class="select-items select-hide menu-language">
                <div class="section inner-select-area">
                    <label class="marginbottom"><b>☰ Select menu language</b></label>

                    <div class="language-option">
                        <input id="lang-en" type="radio" name="menu-lang" value="en" title="Show menus in English">
                        <label for="lang-en" class="select-option" title="Show menus in English"
                            data-lang-key="english">English (US)</label>
                    </div>

                    <div class="language-option">
                        <input id="lang-fi" type="radio" name="menu-lang" value="fi" title="Show menus in Finnish">
                        <label for="lang-fi" class="select-option" title="Show menus in Finnish"
                            data-lang-key="finnish">Finnish (Suomi)</label>
                    </div>

                    <div class="language-option">
                        <input id="lang-swedish" type="radio" name="menu-lang" value="swedish"
                            title="Show menus in Swedish">
                        <label for="lang-swedish" class="select-option" title="Show menus in Swedish"
                            data-lang-key="swedish">Swedish (Svenska)</label>
                    </div>

                    <div class="language-option">
                        <input id="lang-chinese" type="radio" name="menu-lang" value="ch" title="Show menus in Chinese">
                        <label for="lang-chinese" class="select-option" title="Show menus in Chinese"
                            data-lang-key="chinese">Chinese (中文)</label>
                    </div>

                    <!-- <div class="additional-info">
                        <div data-lang-key="looking-for-something-else">Looking for something else?</div>
                        <div class="open-service-lang-panel" id="service-language-link" data-lang-key="filter-services-by-languages">Filter services by languages</div>
                    </div> -->
                </div>

            </div>

        </div>
        <a href="/logout">Kirjaudu ulos</a>
        <div id="navContainer"></div>
        <div id="nav_tree"></div>
    </div>

    <div id="tabs_container">
        <!-- Dynaamisesti generoidut taulukot ja näkymät tulevat tänne -->
    </div>

    <!-- <div id="window_container"></div> -->
    <!-- <div id="table_selector_tree"></div> -->

    <div id="add_row_modal_overlay" class="modal_overlay hidden">
        <div id="add_row_modal" class="modal"></div>
    </div>

    <!-- JavaScript-tiedosto -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
