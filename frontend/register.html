<!-- register.html -->
<!DOCTYPE html>
<html lang="fi">
<head>
    <title>Rekisteröidy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Tells mobile browsers to use the device's full width and scale -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Disable automatic phone number detection for better design control -->
    <meta name="format-detection" content="telephone=no">
    
    <!-- Add to home screen for Safari on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <!-- Add to home screen for Chrome on Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg_color: #222;
            --text_color: white;
            --button_bg_color: #444;
            --button_text_color: white;
            --button_hover_bg_color: #555;
            --button_active_bg_color: #666;
        }

        body {
            margin: 0;
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: var(--bg_color);
            color: var(--text_color);
            font-family: Arial, Helvetica, sans-serif;
        }

        form {
            display: grid;
            gap: 15px;
            width: 300px;
            padding: 20px;
            border: 1px solid var(--text_color);
            border-radius: 8px;
            background-color: #333;
            box-shadow: 3px 3px 15px rgba(0, 0, 0, 0.3);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 8px;
            border: 1px solid var(--text_color);
            border-radius: 4px;
            background-color: #444;
            color: var(--text_color);
        }

        input[type="submit"] {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: var(--button_bg_color);
            color: var(--button_text_color);
            cursor: pointer;
            width: 100%;
        }

        input[type="submit"]:hover {
            background-color: var(--button_hover_bg_color);
        }

        input[type="submit"]:active {
            background-color: var(--button_active_bg_color);
        }

        #submit {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <form method="POST" action="/register">
        <h2>Rekisteröidy</h2>
        <label for="username">Käyttäjätunnus:</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Salasana:</label>
        <input type="password" id="password" name="password" required>
        <label for="email">Sähköposti:</label>
        <input type="email" id="email" name="email" required>
        <label for="full_name">Koko nimi:</label>
        <input type="text" id="full_name" name="full_name" required>
        <input type="submit" id="submit" value="Rekisteröidy">
    </form>
</body>
</html>
